<!doctype html>
<html lang="{{ site.Language.Locale | default "en" }}" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://ws.audioscrobbler.com; font-src 'self';" />
  
  <title>{{ block "title" . }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}" />
  <meta name="author" content="{{ site.Params.author.name | default "Jarema" }}" />

  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="canonical" href="{{ .Permalink }}" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var resolved = stored === "light" ? "light" : "dark";
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(resolved);
        document.documentElement.style.colorScheme = resolved;
      } catch (e) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>
  
  {{ block "head" . }}{{ end }}
</head>
<body class="min-h-screen bg-background text-foreground flex flex-col relative z-10">
  <nav aria-label="Skip navigation">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:bg-background focus:text-foreground focus:px-4 focus:py-2 focus:rounded-md focus:outline-none">
      Skip to main content
    </a>
  </nav>

  {{ partial "header.html" . }}
  
  <main id="main-content" class="flex-1 max-w-4xl mx-auto w-full px-4 py-8">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
