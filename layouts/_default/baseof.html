<!doctype html>
<html lang="{{ site.Language.Locale | default "en" }}" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ block "title" . }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}" />
  <meta name="author" content="{{ site.Params.author.name | default "Jarema" }}" />

  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="alternate icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="canonical" href="{{ .Permalink }}" />
  <link rel="stylesheet" href="/css/globals.css" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var resolved = stored === "light" ? "light" : "dark";
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(resolved);
        document.documentElement.style.colorScheme = resolved;

        var font = localStorage.getItem('font-family') || 'lexend';
        var fontClass = font === 'system' ? '' : font + '-font';
        if (fontClass) document.documentElement.classList.add(fontClass);
      } catch (e) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  {{ block "head" . }}{{ end }}
</head>
<body class="min-h-screen bg-background text-foreground font-sans antialiased">
  <nav aria-label="Skip navigation">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:bg-background focus:text-foreground focus:px-4 focus:py-2 focus:rounded-md focus:outline-none">
      Skip to main content
    </a>
  </nav>

  {{ partial "galaxy.html" . }}

  <div class="flex flex-col min-h-screen relative z-10">
    {{ partial "header.html" . }}
    {{ partial "language_notice.html" . }}

    <main id="main-content" class="flex-1">
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
  </div>
</body>
</html>
