{{ define "main" }}
<h1 class="text-3xl font-bold mb-8">{{ .Title }}</h1>
<div class="space-y-6">
  {{ range .Pages }}
  <article class="p-4 border border-border rounded-lg hover:bg-muted/50 transition-colors">
    <h2 class="text-xl font-bold">
      <a href="{{ .Permalink }}" class="hover:underline">{{ .Title }}</a>
    </h2>
    <p class="text-muted-foreground text-sm mt-1">
      {{ if .Date }}{{ .Date.Format "January 2, 2006" }}{{ end }}
    </p>
    {{ if .Summary }}
    <p class="mt-2 text-foreground">{{ .Summary }}</p>
    {{ end }}
  </article>
  {{ end }}
</div>
{{ end }}
