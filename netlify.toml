[[redirects]]
  from = "/api/status.json"
  to = "https://status.cafe/users/jarema/status.json"
  status = 200
  force = true

[[redirects]]
  from = "/stats/*"
  to = "https://cloud.umami.is/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Xss-Protection = "0"
    Referrer-Policy = "strict-origin"
    Permissions-Policy = "interest-cohort=(), browsing-topics=(), camera=(), microphone=(), geolocation=(), usb=()"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "cross-origin"
    Access-Control-Allow-Origin = "*"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Server = "Jarema"
    Content-Security-Policy = "default-src 'none'; connect-src 'self' jarema.me ws.audioscrobbler.com api-gateway.umami.dev cloud.umami.is; font-src 'self'; img-src 'self' https: *.ytimg.com *.rcd.gg *.googleusercontent.com *.githubusercontent.com; manifest-src 'self'; media-src 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' vercel.live; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; worker-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self' https: geekring.net kagi.com *.me; upgrade-insecure-requests"

